services:
  mongodb:
    image: mongo:7
    container_name: SpendSync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: SpendSync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: SpendSync-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./SpendSync-backend
      dockerfile: Dockerfile
    container_name: SpendSync-backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      APP_ENV: development
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: spendsync
      JWT_SECRET: spendsync-development-secret
      JWT_ACCESS_SECRET: spendsync-development-access-secret
      JWT_REFRESH_SECRET: spendsync-development-refresh-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      FRONTEND_URL: http://localhost:5173
      COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      RATE_LIMIT_MAX: 120
      RATE_LIMIT_WINDOW: 1m
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: no-reply@spendsync.local
      REDIS_URL: redis://redis:6379
      DEFAULT_CURRENCY: INR
      DEFAULT_TIMEZONE: Asia/Kolkata
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb-data:
  redis-data:
