name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render backend
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL || vars.RENDER_BACKEND_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RENDER_BACKEND_URL:-}" ]; then
            echo "RENDER_BACKEND_URL is not configured."
            echo "Add it as a repository secret or variable before running this workflow."
            exit 1
          fi

          case "${RENDER_BACKEND_URL%/}" in
            */api/v1/health)
              HEALTH_URL="${RENDER_BACKEND_URL%/}"
              ;;
            */api/v1)
              HEALTH_URL="${RENDER_BACKEND_URL%/}/health"
              ;;
            */api)
              HEALTH_URL="${RENDER_BACKEND_URL%/}/v1/health"
              ;;
            *)
              HEALTH_URL="${RENDER_BACKEND_URL%/}/api/v1/health"
              ;;
          esac

          echo "Pinging ${HEALTH_URL}"

          set +e
          HTTP_CODE="$(
            curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 10 \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              --output /tmp/render-keep-alive-response.txt \
              --write-out "%{http_code}" \
              "${HEALTH_URL}"
          )"
          CURL_EXIT=$?
          set -e

          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "curl failed with exit code ${CURL_EXIT}."
            case "${CURL_EXIT}" in
              6)
                echo "DNS lookup failed. Check the Render URL."
                ;;
              7)
                echo "Connection failed. The service may still be waking up, or the URL is incorrect."
                ;;
              28)
                echo "Request timed out. Increase the timeout or allow more time for Render cold starts."
                ;;
              35|60)
                echo "TLS/SSL failed. Verify the URL uses https and the certificate is valid."
                ;;
            esac
            exit 1
          fi

          echo "HTTP status: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 400 ]; then
            echo "Render backend responded successfully."
            exit 0
          fi

          echo "Render backend ping failed."
          if [ -s /tmp/render-keep-alive-response.txt ]; then
            echo "Response body:"
            cat /tmp/render-keep-alive-response.txt
          fi
          exit 1
